<nav class="navbar navbar-expand-lg sm-navbar">
  <div class="container">
    <a class="navbar-brand" routerLink="/home" (click)="closeMobileMenu()">
      <img src="assets/logo-transparent.png" alt="Strong Muscle" />
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#smNavLinks" aria-controls="smNavLinks"
            aria-expanded="false" aria-label="Abrir menú">
      <i class="bi bi-list"></i>
    </button>

    <div class="collapse navbar-collapse" id="smNavLinks">
      <ul class="navbar-nav sm-nav me-auto ms-lg-4 mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/home" routerLinkActive="active"
             (click)="closeMobileMenu()">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/mi-actividad" routerLinkActive="active"
             (click)="closeMobileMenu()">Mi Actividad</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/rutinas" routerLinkActive="active"
             (click)="closeMobileMenu()">Rutinas</a>
        </li>
      </ul>

      @if (!auth.loggedIn()) {
        <div class="nav-cta">
          <button class="btn btn-ghost btn-sm" routerLink="/login"
                  (click)="closeMobileMenu()">Iniciar sesión</button>
          <button class="btn btn-primary-red btn-sm" routerLink="/registro"
                  (click)="closeMobileMenu()">Crear cuenta</button>
        </div>
      } @else {
        <div class="nav-cta dropdown">
          <button class="sm-user-trigger" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <span class="avatar">{{ auth.avatarInitial() }}</span>
            <span class="d-none d-md-inline">{{ auth.user()?.name }}</span>
            <i class="bi bi-chevron-down chevron"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end sm-dropdown">
            <li>
              <a class="dropdown-item" routerLink="/perfil" (click)="closeMobileMenu()">
                <i class="bi bi-person"></i><span>Ver perfil</span>
              </a>
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <button class="dropdown-item" type="button" (click)="logout()">
                <i class="bi bi-box-arrow-right"></i><span>Cerrar sesión</span>
              </button>
            </li>
          </ul>
        </div>
      }
    </div>
  </div>
</nav>
